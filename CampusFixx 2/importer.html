<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Importer | CampusFixx</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .importer-container {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 20px;
            max-width: 700px;
            margin: 50px auto;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .file-input-wrapper {
            border: 2px dashed var(--glass-border);
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
            transition: 0.3s;
        }

        .file-input-wrapper:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        #fileInput {
            margin-top: 10px;
        }

        .log-box {
            text-align: left;
            background: #000;
            color: #0f0;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            margin-top: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            border-radius: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        .status-ready {
            background: #667eea;
            color: white;
        }

        .status-working {
            background: #f59e0b;
            color: white;
        }

        .status-done {
            background: #22c55e;
            color: white;
        }
    </style>
</head>

<body class="centered-layout">

    <div class="importer-container" style="background: white; color: black; border: 5px solid #667eea;">
        <h1 style="color: #667eea;">🎓 Student Importer</h1>
        <p><strong>Step 1:</strong> Select your CSV file below.</p>

        <div style="margin: 30px 0; border: 2px solid #ccc; padding: 20px;">
            <input type="file" id="fileInput" accept=".csv"
                style="font-size: 1.2rem; display: block; margin: 20px auto;">
        </div>

        <p><strong>Step 2:</strong> Click the button below.</p>
        <button id="uploadBtn" class="submit-btn"
            style="width: 100%; background: #667eea; color: white; padding: 15px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px;">
            UPLOAD TO FIRESTORE
        </button>

        <div id="status" class="status-badge status-ready">Ready</div>
        <div class="log-box" id="log">
            <div>-- System Log Initialization --</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDKSTsCsCnbUZUzq6T18RJ1j0K63jwFRkU",
            authDomain: "campus-fix-425f7.firebaseapp.com",
            projectId: "campus-fix-425f7",
            storageBucket: "campus-fix-425f7.firebasestorage.app",
            messagingSenderId: "136230732752",
            appId: "1:136230732752:web:9644f9b7a8df3980f46fd5",
            measurementId: "G-ZD50M396Y6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const log = document.getElementById("log");
        const status = document.getElementById("status");
        const uploadBtn = document.getElementById("uploadBtn");

        function writeLog(msg, type = 'info') {
            const entry = document.createElement("div");
            entry.style.color = type === 'error' ? '#ff4d4d' : (type === 'success' ? '#00ff00' : '#00ff00');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        uploadBtn.onclick = () => {
            const file = document.getElementById("fileInput").files[0];
            if (!file) {
                alert("Please select a CSV file first!");
                return;
            }

            uploadBtn.disabled = true;
            status.innerText = "Processing...";
            status.className = "status-badge status-working";
            writeLog("Reading file: " + file.name);

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    const students = results.data;
                    writeLog(`Found ${students.length} records in CSV.`);

                    let successCount = 0;
                    let errorCount = 0;

                    for (let student of students) {
                        try {
                            // Trim whitespace from keys and values
                            const cleanData = {
                                name: (student.name || student.Name || student.fullName || student.Student || student["Full Name"] || "").trim(),
                                regNo: (student.regNo || student.RegNo || student.registerNo || student["Register Number"] || student["Roll No"] || student["Reg No"] || "").trim(),
                                dept: (student.dept || student.Dept || student.department || student.Branch || student.Department || "").trim()
                            };

                            if (!cleanData.regNo || !cleanData.name) {
                                writeLog(`Skipping invalid record: ${JSON.stringify(student)}`, 'error');
                                continue;
                            }

                            await db.collection("students").add(cleanData);
                            successCount++;
                            if (successCount % 10 === 0) {
                                writeLog(`Progress: ${successCount}/${students.length} uploaded...`);
                            }
                        } catch (err) {
                            errorCount++;
                            writeLog(`Error uploading: ${err.message}`, 'error');
                        }
                    }

                    writeLog(`Upload Complete! Success: ${successCount}, Errors: ${errorCount}`, 'success');
                    status.innerText = "Done!";
                    status.className = "status-badge status-done";
                    uploadBtn.disabled = false;
                },
                error: (error) => {
                    writeLog("Parsing Error: " + error.message, 'error');
                    uploadBtn.disabled = false;
                }
            });
        };
    </script>
</body>

</html>
