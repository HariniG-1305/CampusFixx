<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | CampusFixx</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                    <span>CampusFixx</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="staff_dashboard.html" class="active">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Lodge Complaint
                </a>

                <div style="margin-top: auto; border-top: 1px solid var(--glass-border); padding-top: 10px;">
                    <a href="#" id="staffLogout" style="color: #EF4444;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                            </path>
                        </svg>
                        Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Staff Complaint Portal</h2>
                <div class="user-profile">
                    <span id="headerUserName">Teacher</span>
                    <div class="avatar" id="headerUserAvatar">T</div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="form-card">
                    <p class="form-header">Register a New Issue</p>
                    <form id="complaintForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" required readonly
                                    style="opacity: 0.7; cursor: not-allowed;">
                            </div>

                            <div class="form-group">
                                <label for="regno">Staff ID / Mail</label>
                                <input type="text" id="regno" required readonly
                                    style="opacity: 0.7; cursor: not-allowed;">
                            </div>

                            <div class="form-group">
                                <label for="department">Your Department</label>
                                <select id="department" required>
                                    <option value="" disabled selected>Select Department</option>
                                    <option value="General">General / Administrative</option>
                                    <option>CSE</option>
                                    <option>IT</option>
                                    <option>ECE</option>
                                    <option>EEE</option>
                                    <option>MECH</option>
                                    <option>CIVIL</option>
                                    <option>AGRI</option>
                                    <option>FT</option>
                                    <option>CHEM</option>
                                    <option>PHARMA</option>
                                    <option>AIML</option>
                                    <option>AERO</option>
                                    <option>BIOTECH</option>
                                    <option>CYBER</option>
                                    <option>BME</option>
                                    <option>IOT</option>
                                    <option>MECHATRONICS</option>
                                    <option>ROBOTICS</option>
                                    <option>AIDS</option>
                                    <option>S&F</option>
                                    <option value="Other">Other / Non-Teaching</option>
                                </select>
                                <input type="text" id="otherDepartment"
                                    placeholder="Please specify your department/team"
                                    style="display: none; margin-top: 5px;">
                            </div>

                            <div class="form-group">
                                <label for="block">Block</label>
                                <select id="block" required>
                                    <option value="" disabled selected>Select</option>
                                    <option>Additional Block</option>
                                    <option>Temple Tower</option>
                                    <option>Main Block</option>
                                    <option>PIF</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="floor">Floor</label>
                                <select id="floor" required>
                                    <option value="" disabled selected>Select</option>
                                    <option>Ground</option>
                                    <option>1</option>
                                    <option>2</option>
                                    <option>3</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="roomNumber">Room No / Lab</label>
                                <input type="text" id="roomNumber" placeholder="e.g. 201, Staff Room" required>
                            </div>

                            <div class="form-group">
                                <label for="landmark">Landmark</label>
                                <input type="text" id="landmark" placeholder="e.g. Near HOD Room" required>
                            </div>

                            <div class="form-group">
                                <label for="issueType">Category</label>
                                <select id="issueType" required>
                                    <option value="" disabled selected>Select Category</option>
                                    <option>Electrical (Lights/Fans)</option>
                                    <option>Plumbing (Water/Leaks)</option>
                                    <option>Cleanliness (Garbage/Dust)</option>
                                    <option>Internet / WiFi</option>
                                    <option>Furniture / Classroom</option>
                                    <option>Other</option>
                                </select>
                                <input type="text" id="otherIssue" placeholder="Specify Issue"
                                    style="display: none; margin-top: 5px;">
                            </div>

                            <div class="form-group">
                                <label for="priority">Priority</label>
                                <select id="priority" required>
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High (Urgent)</option>
                                </select>
                            </div>

                            <div class="form-group full-width">
                                <label for="description">Detailed Description</label>
                                <textarea id="description" rows="4" placeholder="Describe the issue..."
                                    required></textarea>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn">Submit Report</button>
                    </form>
                </div>

                <div id="successMessage"
                    style="display: none; text-align: center; background: var(--glass-bg); padding: 40px; border-radius: 12px; margin-top: 20px;">
                    <div style="font-size: 3rem; margin-bottom: 20px;">✅</div>
                    <h2 style="color: var(--success); margin-bottom: 10px;">Reported Successfully!</h2>
                    <p>Complaint ID:</p>
                    <span id="displayComplaintId"
                        style="display: block; font-size: 2rem; font-weight: 700; color: var(--primary); margin: 15px 0;">CMP-XXXX</span>
                    <button onclick="location.reload()" class="submit-btn" style="width: auto; padding: 10px 30px;">File
                        Another</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const auth = localStorage.getItem("campusFixx_admin_auth");
            const role = localStorage.getItem("campusFixx_admin_role");
            const staffMail = localStorage.getItem("campusFixx_staff_mail");

            if (!auth || role !== "Staff") {
                window.location.href = "staff_login.html";
                return;
            }

            document.getElementById("name").value = "Teacher / Staff";
            document.getElementById("regno").value = staffMail || "Staff User";
            document.getElementById("headerUserName").innerText = "Staff User";

            document.getElementById("staffLogout").addEventListener("click", () => {
                localStorage.clear();
                window.location.href = "index.html";
            });

            const deptSelect = document.getElementById("department");
            const otherDeptInput = document.getElementById("otherDepartment");
            const issueSelect = document.getElementById("issueType");
            const otherIssueInput = document.getElementById("otherIssue");

            function toggleField(select, input) {
                if (select.value === "Other") {
                    input.style.display = "block";
                    input.required = true;
                } else {
                    input.style.display = "none";
                    input.required = false;
                }
            }

            deptSelect.addEventListener("change", () => toggleField(deptSelect, otherDeptInput));
            issueSelect.addEventListener("change", () => toggleField(issueSelect, otherIssueInput));
        });
    </script>
</body>

</html>
